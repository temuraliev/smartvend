<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <text x="58" y="68" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17202a">SmartVend Mini Logic Block Diagram</text>
  <text x="58" y="105" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#52606d">Use this as a guide only. Replace with an actual CircuitVerse screenshot before submission.</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#17202a">
    <rect x="60" y="160" width="230" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="84" y="197">C1 - Coin 1</text>
    <rect x="60" y="235" width="230" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="84" y="272">C2 - Coin 2</text>
    <rect x="60" y="310" width="230" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="84" y="347">S - Selected</text>
    <rect x="60" y="385" width="230" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="84" y="422">A - Available</text>
    <rect x="60" y="460" width="230" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="84" y="497">X - Cancel</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#17202a">
    <rect x="420" y="178" width="210" height="70" rx="8" fill="#e6f6f2" stroke="#15917f" stroke-width="2"/>
    <text x="462" y="220">AND: P=C1.C2</text>
    <rect x="420" y="276" width="210" height="70" rx="8" fill="#e6f6f2" stroke="#15917f" stroke-width="2"/>
    <text x="466" y="318">OR: M=C1+C2</text>
    <rect x="420" y="402" width="210" height="70" rx="8" fill="#fff7e6" stroke="#d38300" stroke-width="2"/>
    <text x="459" y="444">NOT gates</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#17202a">
    <rect x="760" y="135" width="260" height="90" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="795" y="172">Dispense Logic</text>
    <text x="796" y="204">D = X'.S.A.P</text>
    <rect x="760" y="280" width="260" height="90" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="797" y="317">Return Logic</text>
    <text x="795" y="349">R = M.(X+S.A')</text>
    <rect x="760" y="425" width="260" height="120" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="807" y="462">Error Logic</text>
    <text x="784" y="494">E = X'.[(S.A.P')</text>
    <text x="820" y="526">+(S.A')+(S'.M)]</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#17202a">
    <rect x="1090" y="150" width="150" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="1125" y="187">D LED</text>
    <rect x="1090" y="295" width="150" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="1125" y="332">R LED</text>
    <rect x="1090" y="468" width="150" height="58" rx="8" fill="#ffffff" stroke="#bfccd8"/>
    <text x="1125" y="505">E LED</text>
  </g>

  <g stroke="#718096" stroke-width="3" fill="none">
    <path d="M290 189 C340 189 365 213 420 213"/>
    <path d="M290 264 C340 264 365 213 420 213"/>
    <path d="M290 189 C340 189 365 311 420 311"/>
    <path d="M290 264 C340 264 365 311 420 311"/>
    <path d="M630 213 C690 213 710 180 760 180"/>
    <path d="M630 311 C690 311 710 325 760 325"/>
    <path d="M630 437 C690 437 710 485 760 485"/>
    <path d="M1020 180 C1050 180 1060 179 1090 179"/>
    <path d="M1020 325 C1050 325 1060 324 1090 324"/>
    <path d="M1020 485 C1050 485 1060 497 1090 497"/>
